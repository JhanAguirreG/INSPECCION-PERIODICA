<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SIGHI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            margin:0;
        }

        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            background:#1f2937;
            color:white;
        }

        .sidebar h3{
            padding:20px;
        }

        .sidebar a{
            color:white;
            display:block;
            padding:12px 20px;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#374151;
        }

        .content{
            margin-left:260px;
            padding:30px;
        }

        .card-kpi{
            border:none;
            border-radius:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h3>SIGHI</h3>

    <a href="{% url 'dashboard' %}">
        Dashboard
    </a>

    <a href="{% url 'seleccionar' %}">
        Nueva Inspección
    </a>

    <a href="{% url 'lista_inspecciones' %}">
        Historial
    </a>

</div>

<div class="content">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
