<!DOCTYPE html>
<html>
<head>
    <title>Lista Inspecciones</title>
</head>
<body>

<h2>Inspecciones</h2>

<a href="{% url 'nueva_inspeccion' %}">Nueva Inspección</a>

<ul>
    {% for inspeccion in inspecciones %}
        <li>
            {{ inspeccion.servicio }} -
            {{ inspeccion.fecha }}
            {% if inspeccion.pdf %}
                - <a href="{{ inspeccion.pdf.url }}">PDF</a>
            {% endif %}
        </li>
    {% endfor %}
</ul>

</body>
</html>
