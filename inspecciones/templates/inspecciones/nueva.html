<!DOCTYPE html>
<html>
<head>
    <title>Nueva Inspección</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f37021;
            color: black;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        canvas {
            border: 1px solid black;
            width: 100%;
            height: 150px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            background-color: #f37021;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>{{ servicio.nombre }}</h2>

<form method="POST">
    {% csrf_token %}

    <table>
        <tr>
            <th>EQUIPO</th>
            <th>OBSERVACIÓN</th>
        </tr>

        {% for equipo in equipos %}
        <tr>
            <td>{{ equipo.nombre }}</td>
            <td>
                <input type="text" name="observacion_{{ equipo.id }}" style="width:100%;">
            </td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <label>Observaciones Generales:</label><br>
    <textarea name="observaciones" rows="4" style="width:100%;"></textarea>

    <br><br>

    <h3>Firma Jefe del Servicio</h3>
    <canvas id="firmaJefeCanvas"></canvas>
    <input type="hidden" name="firma_jefe" id="firma_jefe">

    <h3>Firma Verificación Biomédica</h3>
    <canvas id="firmaVerificacionCanvas"></canvas>
    <input type="hidden" name="firma_verificacion" id="firma_verificacion">

    <button type="submit">Guardar Inspección</button>

</form>

<script>
function ajustarCanvas(canvas) {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const rect = canvas.getBoundingClientRect();

    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    canvas.getContext("2d").scale(ratio, ratio);
}

function iniciarFirma(canvasId, inputId) {
    const canvas = document.getElementById(canvasId);
    const input = document.getElementById(inputId);

    ajustarCanvas(canvas);

    const signaturePad = new SignaturePad(canvas);

    window.addEventListener("resize", function () {
        ajustarCanvas(canvas);
        signaturePad.clear();
    });

    canvas.closest("form").addEventListener("submit", function () {
        if (!signaturePad.isEmpty()) {
            input.value = signaturePad.toDataURL("image/png");
        }
    });
}

document.addEventListener("DOMContentLoaded", function () {
    iniciarFirma("firmaJefeCanvas", "firma_jefe");
    iniciarFirma("firmaVerificacionCanvas", "firma_verificacion");
});
</script>

</body>
</html>
