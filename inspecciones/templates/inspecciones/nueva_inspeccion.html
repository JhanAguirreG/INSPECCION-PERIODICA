<!DOCTYPE html>
<html>
<head>
    <title>Nueva Inspección</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
</head>
<body>

<h2>Nueva Inspección Diaria</h2>

<form method="POST">
    {% csrf_token %}

    <label>Servicio:</label>
    <select name="servicio" required>
        <option value="">Seleccione</option>
        {% for servicio in servicios %}
            <option value="{{ servicio.id }}">{{ servicio.nombre }}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Observaciones:</label><br>
    <textarea name="observaciones"></textarea>

    <br><br>

    <label>Firma:</label><br>
    <canvas id="signature-pad" width="400" height="200" style="border:1px solid black;"></canvas>
    <input type="hidden" name="firma" id="firmaInput">

    <br><br>

    <button type="submit">Guardar Inspección</button>
</form>

<script>
    var canvas = document.getElementById('signature-pad');
    var signaturePad = new SignaturePad(canvas);

    document.querySelector("form").addEventListener("submit", function () {
        var dataURL = signaturePad.toDataURL();
        document.getElementById("firmaInput").value = dataURL;
    });
</script>

</body>
</html>
