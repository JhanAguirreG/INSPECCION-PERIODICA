<!DOCTYPE html>
<html>
<head>
    <title>Seleccionar Servicio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            padding: 30px;
        }

        .card {
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background-color: #f37021;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #d85f18;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Seleccionar Institución y Servicio</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Institución:</label>
        <select name="institucion" id="institucionSelect" required>
            <option value="">Seleccione</option>
            {% for inst in instituciones %}
                <option value="{{ inst.id }}">{{ inst.nombre }}</option>
            {% endfor %}
        </select>

        <label>Servicio:</label>
        <select name="servicio" id="servicioSelect" required>
            <option value="">Seleccione</option>
        </select>

        <button type="submit">Continuar</button>
    </form>
</div>

<script>
document.getElementById("institucionSelect").addEventListener("change", function() {

    const institucionId = this.value;

    fetch(`/inspecciones/cargar-servicios/?institucion_id=${institucionId}`)
        .then(response => response.json())
        .then(data => {

            const servicioSelect = document.getElementById("servicioSelect");
            servicioSelect.innerHTML = '<option value="">Seleccione</option>';

            data.forEach(servicio => {
                servicioSelect.innerHTML +=
                    `<option value="${servicio.id}">${servicio.nombre}</option>`;
            });
        });

});
</script>

</body>
</html>
